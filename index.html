            if (isOwner && !bet.salvo) {
                placarHTML = `<input type="text" class="form-control form-control-sm placar-input" placeholder="ex: 2-1" value="${bet.placar}" style="width:80px; text-align:center;">`;
                resultadoHTML = `<select class="form-select form-select-sm resultado-select" style="width:200px;">
                    <option value="">--</option>
                    <option value="Casa" ${bet.resultado === 'Casa' ? 'selected' : ''}>Vitória ${jogo.time1}</option>
                    <option value="Fora" ${bet.resultado === 'Fora' ? 'selected' : ''}>Vitória ${jogo.time2}</option>
                    <option value="Empate" ${bet.resultado === 'Empate' ? 'selected' : ''}>Empate</option>
                </select>`;
                acaoHTML = `<button class="btn btn-sm btn-salvar" onclick="salvarApostaJogo('${participante}', ${jogo.id})">Salvar</button>`;
            } else {
                placarHTML = bet.placar || '<span class="text-muted">-</span>';
                resultadoHTML = bet.resultado ? 
                    (bet.resultado === 'Casa' ? `Vitória ${jogo.time1}` : bet.resultado === 'Fora' ? `Vitória ${jogo.time2}` : 'Empate') 
                    : '<span class="text-muted">-</span>';
                acaoHTML = bet.salvo ? '<span class="salvo-badge">✅ Salvo</span>' : '';
            }

            tr.innerHTML = `
                <td>${jogo.id}</td>
                <td>${flag(jogo.time1)} ${jogo.time1} vs ${flag(jogo.time2)} ${jogo.time2}</td>
                <td>${placarHTML}</td>
                <td>${resultadoHTML}</td>
                <td>${acaoHTML}</td>`;
            tbody.appendChild(tr);
        });
    }

    async function salvarApostaJogo(participante, idJogo) {
        if (usuarioLogado !== participante) {
            mostrarModal('Erro', 'Você não está logado como ' + participante, 'erro');
            return;
        }
        const linhas = document.querySelectorAll('#tabela-apostas tbody tr');
        let linhaAlvo = null;
        for (const l of linhas) {
            if (parseInt(l.cells[0].textContent) === idJogo) { linhaAlvo = l; break; }
        }
        if (!linhaAlvo) return;
        const inputPlacar = linhaAlvo.cells[2].querySelector('input');
        const selectResultado = linhaAlvo.cells[3].querySelector('select');
        if (!inputPlacar || !selectResultado) return;
        const placar = inputPlacar.value.trim();
        const resultado = selectResultado.value;
        if (!placar || !resultado) {
            mostrarModal('Atenção', 'Preencha placar e resultado.', 'erro');
            return;
        }
        if (!/^\d+-\d+$/.test(placar)) {
            mostrarModal('Formato inválido', 'Use o formato "2-1".', 'erro');
            return;
        }
        if (!apostasAtuais[participante]) apostasAtuais[participante] = {};
        apostasAtuais[participante][idJogo] = { placar, resultado, salvo: true };
        try {
            await apostasCollectionRef.doc(participante).set({ palpites: apostasAtuais[participante] }, { merge: true });
            carregarApostasParticipante();
            mostrarModal('Sucesso', `Aposta do jogo #${idJogo} salva!`);
        } catch (e) {
            console.error(e);
            mostrarModal('Erro', 'Erro ao salvar a aposta.', 'erro');
        }
    }

    // ==================== RENDERIZAÇÃO JOGOS ====================
    function renderizarTabelaJogos() {
        let html = `<table class="table table-striped table-hover" id="tabela-jogos">
            <thead><tr><th>#</th><th>Fase</th><th>Grupo</th><th>Time 1</th><th>Time 2</th><th>Placar</th><th>Resultado</th></tr></thead><tbody>`;
        jogos.forEach(jogo => {
            let placar = '';
            let travado = false;
            if (jogoPossuiResultadoOficial(jogo.id)) {
                const res = resultadosAtuais[jogo.id];
                placar = `${res.golsT1}-${res.golsT2}`;
                travado = true;
            } else if (placaresAPI[jogo.id]) {
                placar = placaresAPI[jogo.id];
            }
            const resultadoDisplay = getResultadoDisplay(jogo, placar);
            html += `<tr class="${travado ? 'jogo-travado' : ''}">
                <td>${jogo.id}</td><td>${jogo.fase}</td><td>${jogo.grupo}</td>
                <td>${flag(jogo.time1)} ${jogo.time1}</td><td>${flag(jogo.time2)} ${jogo.time2}</td>
                <td class="placar-cell">${placar}</td><td class="resultado-cell"><strong>${resultadoDisplay}</strong></td></tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('jogos-container').innerHTML = html;
    }

    function renderizarClassificacao() {
        const classificacao = participantes.map(nome => {
            let pontosPlacar = 0, pontosResultado = 0;
            const bets = apostasAtuais[nome] || {};
            for (const jogo of jogos) {
                const res = resultadosAtuais[jogo.id];
                if (!res || typeof res.golsT1 !== 'number' || typeof res.golsT2 !== 'number') continue;
                const bet = bets[jogo.id];
                if (!bet || !bet.placar || !bet.resultado) continue;
                if (bet.placar === `${res.golsT1}-${res.golsT2}`) {
                    pontosPlacar += 3;
                } else {
                    const resultadoReal = resultadoTexto(res.golsT1, res.golsT2);
                    if (bet.resultado === resultadoReal) {
                        pontosResultado += 1;
                    }
                }
            }
            return { nome, pontosPlacar, pontosResultado, total: pontosPlacar + pontosResultado };
        });
        classificacao.sort((a, b) => b.total - a.total || b.pontosPlacar - a.pontosPlacar);
        let html = `<table class="table table-striped table-hover" id="tabela-classificacao">
            <thead><tr><th>Posição</th><th>Participante</th><th>Pontos Placar (3)</th><th>Pontos Resultado (1)</th><th>TOTAL</th></tr></thead><tbody>`;
        classificacao.forEach((item, index) => {
            let classe = '';
            if (index === 0) classe = 'ranking-ouro';
            else if (index === 1) classe = 'ranking-prata';
            else if (index === 2) classe = 'ranking-bronze';
            html += `<tr class="${classe}"><td>${index + 1}º</td><td>${item.nome}</td><td>${item.pontosPlacar}</td><td>${item.pontosResultado}</td><td><strong>${item.total}</strong></td></tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('classificacao-container').innerHTML = html;
    }

    function atualizarTudo() {
        renderizarTabelaJogos();
        renderizarClassificacao();
        const participanteSelecionado = document.getElementById('participante-select').value;
        if (participanteSelecionado) carregarApostasParticipante();
    }

    // ==================== AUTO‑SAVE DE RESULTADOS ====================
    async function salvarResultadoAutomatico(idJogo, golsT1, golsT2) {
        resultadosAtuais[idJogo] = { golsT1, golsT2 };
        try {
            await resultadosDocRef.set({ data: resultadosAtuais }, { merge: true });
            atualizarTudo();
        } catch (e) { console.error(e); }
    }

    async function buscarPlacarAoVivo() {
        try {
            const resposta = await fetch('https://sportscore.com/api/widget/matches/?sport=football');
            const dados = await resposta.json();
            if (dados?.data?.length) {
                const linhas = document.querySelectorAll('#tabela-jogos tbody tr');
                for (const row of linhas) {
                    const timeCasa = row.cells[3]?.textContent?.trim();
                    const timeFora = row.cells[4]?.textContent?.trim();
                    if (!timeCasa || !timeFora) continue;
                    const match = dados.data.find(m => {
                        const h = m.home_team?.name?.toLowerCase();
                        const a = m.away_team?.name?.toLowerCase();
                        if (!h || !a) return false;
                        return (h.includes(timeCasa.toLowerCase()) || timeCasa.toLowerCase().includes(h)) &&
                               (a.includes(timeFora.toLowerCase()) || timeFora.toLowerCase().includes(a));
                    });
                    if (!match || match.home_score == null || match.away_score == null) continue;
                    const idJogo = parseInt(row.cells[0].textContent);
                    const gT1 = match.home_score, gT2 = match.away_score;
                    const status = match.status?.toLowerCase();
                    const acabou = (status === 'finished' || status === 'ft' || status === 'closed');
                    if (acabou && !jogoPossuiResultadoOficial(idJogo)) {
                        await salvarResultadoAutomatico(idJogo, gT1, gT2);
                        continue;
                    }
                    if (!jogoPossuiResultadoOficial(idJogo)) {
                        placaresAPI[idJogo] = `${gT1}-${gT2}`;
                        row.cells[5].textContent = placaresAPI[idJogo];
                        const jogoObj = jogos.find(j => j.id === idJogo);
                        if (jogoObj) row.cells[6].innerHTML = `<strong>${getResultadoDisplay(jogoObj, placaresAPI[idJogo])}</strong>`;
                    }
                }
            }
        } catch (e) { console.error('Erro SportScore:', e); }
    }

    // ==================== LISTENERS ====================
    function configurarListeners() {
        resultadosDocRef.onSnapshot(doc => {
            if (doc.exists()) resultadosAtuais = doc.data().data || {};
            else resultadosAtuais = {};
            atualizarTudo();
        });
        apostasCollectionRef.onSnapshot(snapshot => {
            apostasAtuais = {};
            snapshot.forEach(doc => { apostasAtuais[doc.id] = doc.data().palpites || {}; });
            const participanteSelecionado = document.getElementById('participante-select').value;
            if (participanteSelecionado) carregarApostasParticipante();
            renderizarClassificacao();
        });
    }

    async function salvarResultadosReais() {
        if (usuarioLogado !== "David") {
            mostrarModal('Acesso restrito', 'Apenas o administrador pode usar esta função.', 'erro');
            return;
        }
        const novos = {};
        document.querySelectorAll('#tabela-jogos tbody tr').forEach(row => {
            const id = parseInt(row.cells[0].textContent);
            if (jogoPossuiResultadoOficial(id)) return;
            const txt = row.cells[5].textContent.trim();
            if (!txt) return;
            const p = txt.split('-');
            if (p.length === 2) {
                const g1 = parseInt(p[0]), g2 = parseInt(p[1]);
                if (!isNaN(g1) && !isNaN(g2)) novos[id] = { golsT1: g1, golsT2: g2 };
            }
        });
        if (Object.keys(novos).length === 0) {
            mostrarModal('Nada a salvar', 'Nenhum placar novo encontrado.', 'erro');
            return;
        }
        resultadosAtuais = { ...resultadosAtuais, ...novos };
        try {
            await resultadosDocRef.set({ data: resultadosAtuais }, { merge: true });
            atualizarTudo();
            mostrarModal('Sucesso', 'Resultados salvos com sucesso!');
        } catch (e) {
            console.error(e);
            mostrarModal('Erro', 'Erro ao salvar resultados.', 'erro');
        }
    }

    async function atualizarClassificacao() {
        if (usuarioLogado !== "David") {
            mostrarModal('Acesso restrito', 'Apenas o administrador pode forçar a atualização.', 'erro');
            return;
        }
        renderizarClassificacao();
        mostrarModal('Atualizado', 'Classificação atualizada.');
    }

    // ==================== INICIALIZAÇÃO ====================
    window.addEventListener('DOMContentLoaded', async () => {
        const selectLogin = document.getElementById('login-participante');
        const selectVisualizacao = document.getElementById('participante-select');
        [selectLogin, selectVisualizacao].forEach(sel => {
            sel.innerHTML = '<option value="">-- Selecione --</option>';
            participantes.forEach(nome => {
                const opt = document.createElement('option');
                opt.value = nome; opt.textContent = nome;
                sel.appendChild(opt);
            });
        });

        await carregarSenhas();
        for (const nome of participantes) {
            if (!senhasParticipantes[nome]) {
                await participantesCollectionRef.doc(nome).set({ senha: 'copa2026' });
                senhasParticipantes[nome] = 'copa2026';
            }
        }

        renderizarTabelaJogos();
        renderizarClassificacao();
        configurarListeners();
        buscarPlacarAoVivo();
        setInterval(buscarPlacarAoVivo, 30000);
        document.getElementById('classificacao-tab').addEventListener('shown.bs.tab', renderizarClassificacao);
        document.getElementById('apostas-tab').addEventListener('shown.bs.tab', () => {
            if (usuarioLogado) {
                document.getElementById('participante-select').value = usuarioLogado;
                carregarApostasParticipante();
            }
        });
    });
</script>
